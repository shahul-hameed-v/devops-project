name: Python CI


on:
  push:
    branches:
      - master


jobs:
  test:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout Repository
        uses: action/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Install pytest
        run: pip install pytest


      - name: Run Tests
        run: pytest
